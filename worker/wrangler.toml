name = "asmfinance-leads"
main = "index.js"
compatibility_date = "2024-11-01"

# CORS allowlist. Edit if your origins differ.
[vars]
ALLOWED_ORIGIN = "https://asmfinance.tech,https://www.asmfinance.tech,http://localhost:4321"

# Secrets — set each with `wrangler secret put <NAME>` (do NOT commit them here):
#   APPS_SCRIPT_URL      the Apps Script web-app /exec URL (from leads.gs deployment)
#   LEADS_SHARED_SECRET  random token; must match SHARED_SECRET in leads.gs
